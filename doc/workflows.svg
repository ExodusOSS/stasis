<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 244" aria-label="Stasis workflows" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="grad" gradientUnits="userSpaceOnUse" x1="24" y1="0" x2="738" y2="0">
      <stop offset="0%" stop-color="#1f9cff"/>
      <stop offset="60%" stop-color="#8c5bfe"/>
      <stop offset="100%" stop-color="#b85bfe"/>
    </linearGradient>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10z" fill="#8c8c8c"/>
    </marker>
  </defs>

  <rect x="8" y="12" width="744" height="220" rx="20" fill="#969696" fill-opacity=".09" stroke="#8c8c8c" stroke-opacity=".25" stroke-width="1.5"/>

  <!-- SERVERS -->
  <text x="24" y="36" fill="#8c8c8c" font-size="12.5" font-weight="700" letter-spacing="1.5">SERVERS</text>
  <rect x="24"  y="48" width="150" height="56" rx="14" fill="url(#grad)"/>
  <rect x="212" y="48" width="150" height="56" rx="14" fill="url(#grad)"/>
  <rect x="400" y="48" width="150" height="56" rx="14" fill="url(#grad)"/>
  <rect x="588" y="48" width="150" height="56" rx="14" fill="url(#grad)"/>
  <line x1="180" y1="76" x2="204" y2="76" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" marker-end="url(#arw)"/>
  <line x1="368" y1="76" x2="392" y2="76" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" marker-end="url(#arw)"/>
  <line x1="556" y1="76" x2="580" y2="76" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" marker-end="url(#arw)"/>
  <g fill="#fff" text-anchor="middle">
    <text x="99"  y="72" font-size="16" font-weight="600">Source</text>
    <text x="99"  y="90" font-size="11" fill-opacity=".85">with node_modules</text>
    <text x="287" y="72" font-size="16" font-weight="600">Bundle</text>
    <text x="287" y="90" font-size="11" fill-opacity=".85">only used code</text>
    <text x="475" y="72" font-size="16" font-weight="600">Audit</text>
    <text x="475" y="90" font-size="11" fill-opacity=".85">external tool</text>
    <text x="663" y="81" font-size="16" font-weight="600">Production</text>
  </g>

  <!-- APPLICATIONS -->
  <text x="24" y="150" fill="#8c8c8c" font-size="12.5" font-weight="700" letter-spacing="1.5">APPLICATIONS</text>
  <rect x="24"  y="162" width="150" height="56" rx="14" fill="url(#grad)"/>
  <rect x="212" y="162" width="150" height="56" rx="14" fill="url(#grad)"/>
  <rect x="400" y="162" width="150" height="56" rx="14" fill="url(#grad)"/>
  <rect x="588" y="162" width="150" height="56" rx="14" fill="url(#grad)"/>
  <line x1="180" y1="190" x2="204" y2="190" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" marker-end="url(#arw)"/>
  <line x1="368" y1="190" x2="392" y2="190" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" marker-end="url(#arw)"/>
  <line x1="556" y1="190" x2="580" y2="190" stroke="#8c8c8c" stroke-width="2" stroke-linecap="round" marker-end="url(#arw)"/>
  <g fill="#fff" text-anchor="middle">
    <text x="99"  y="186" font-size="16" font-weight="600">Source</text>
    <text x="99"  y="204" font-size="11" fill-opacity=".85">with node_modules</text>
    <text x="287" y="186" font-size="16" font-weight="600">Bundle</text>
    <text x="287" y="204" font-size="11" fill-opacity=".85">only used code</text>
    <text x="475" y="186" font-size="16" font-weight="600">Audit</text>
    <text x="475" y="204" font-size="11" fill-opacity=".85">external tool</text>
    <text x="663" y="186" font-size="16" font-weight="600">Reproduce</text>
    <text x="663" y="204" font-size="11" fill-opacity=".85">and ship</text>
  </g>
</svg>
