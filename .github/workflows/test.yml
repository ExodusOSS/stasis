name: Test

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    strategy:
      # Run every Node version even if one fails, so a single break doesn't
      # hide the others in a compatibility matrix.
      fail-fast: false
      matrix:
        node-version:
          - '24.14.0' # minimum supported (package.json engines: >=24.14.0)
          - nvmrc     # version pinned in .nvmrc (what local dev uses)
          - '24'      # latest 24.x
          - '26.0.0'  # first release of the next major
          - '26'      # latest 26.x
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          run_install: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # The 'nvmrc' matrix entry resolves to whatever .nvmrc pins, so it
          # tracks the dev version automatically; every other entry is a literal.
          node-version: ${{ matrix.node-version == 'nvmrc' && steps.nvmrc.outputs.version || matrix.node-version }}
          cache: pnpm
          # Include every pnpm-lock.yaml in the cache key so fixture lockfiles
          # invalidate the store cache too — otherwise tests/fixtures/*/pnpm-lock.yaml
          # changes don't trigger a fresh store, and a stale cache could mask a
          # dep update.
          cache-dependency-path: '**/pnpm-lock.yaml'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm i --frozen-lockfile
      # The popular-npm-modules fixture has its own (sub-)workspace with real
      # npm deps; the headline test installs from it. Install here so the test
      # doesn't pay the network cost (or fail under network outages) on every
      # CI run — the test's before() hook only runs install as a local-dev
      # fallback when node_modules is missing.
      - run: pnpm -C tests/fixtures/popular-npm-modules i --frozen-lockfile
      - run: node --run test
